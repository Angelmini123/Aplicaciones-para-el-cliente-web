<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Clientes</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            color: white;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #cbd5f5;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #1f2937;
            color: white;
            font-size: 14px;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .form-group input:focus {
            border: 2px solid #38bdf8;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(99,102,241,0.5);
        }

    </style>
</head>
<body>

    <div class="card">
        <h2>Registro de Cliente</h2>

        <form>
            <div class="form-group">
                <label>Cédula</label>
                <input type="text" placeholder="Ingrese su cédula" required>
            </div>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" placeholder="Ingrese su nombre" required>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" placeholder="Ingrese su dirección" required>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" placeholder="Ingrese su teléfono" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" placeholder="Ingrese su correo" required>
            </div>

            <button class="btn" type="submit">Registrar</button>
        </form>
    </div>

</body>
</html>
